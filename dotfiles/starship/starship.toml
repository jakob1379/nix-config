[character]
success_symbol = " [â‌¯](bold #69FF94)"
error_symbol = " [â‌¯](bold #69FF94)"

[cmd_duration]
disabled = false
min_time = 0
show_milliseconds = false
style = "fg:white bg:plum"
format = "[î‚²](fg:plum bg:prev_bg)[ $duration ]($style)"

[container]
symbol = "î§ٹَ±•–"
style = "fg:white bg:plum"
format = "[$symbol $name]($style)"

[custom.root]
command = "printf 'âڑ،'"
when = "test \"$EUID\" -eq 0"
shell = ["bash", "--noprofile", "--norc"]
style = "fg:tan bg:sky"
format = "[ $output]($style)"

[directory]
style = "fg:white bg:blush"
format = "[ $path ]($style)"
truncation_length = 3
truncate_to_repo = true

[fill]
symbol = " "

[git_branch]
style = "fg:white bg:teal"
format = "[ $symbol$branch]($style)"

[git_status]
style = "fg:white bg:teal"
format = "[$all_status$ahead_behind ]($style)"
conflicted = " =${count}"
ahead = " â‡،${count}"
behind = " â‡£${count}"
diverged = " â‡•â‡،${ahead_count}â‡£${behind_count}"
untracked = " ?${count}"
stashed = " *${count}"
modified = " ïپ„ ${count}"
staged = " ïپ† ${count}"
renamed = " آ»${count}"
deleted = " âœک${count}"

[nix_shell]
symbol = "ïŒ“"
style = "fg:white bg:nix"
format = "[ $symbol Nix ]($style)"

[nodejs]
symbol = "ïŒ“"
style = "fg:white bg:sky"
format = "[ $symbol $version ]($style)"

[os]
disabled = false
format = "[$symbol](fg:white bg:plum)"

[os.symbols]
Alpine = "ïŒ€"
